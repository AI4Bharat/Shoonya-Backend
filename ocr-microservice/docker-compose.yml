version: '3.9'

services:
  ocr-microservice:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: ocr-microservice
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-openai}
      OCR_TIMEOUT_MS: ${OCR_TIMEOUT_MS:-30000}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"