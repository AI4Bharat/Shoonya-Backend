version: "3.3"

services:
  nginx:
    build: ./nginx
    image: evgeniy-khyst/nginx
    env_file:
      - ./config.env
    volumes:
      - nginx_conf:/etc/nginx/sites
      - letsencrypt_certs:/etc/letsencrypt
      - certbot_acme_challenge:/var/www/certbot
      - ./vhosts:/etc/nginx/vhosts
      - static_volume:/backend/static
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    depends_on:
      - coraza-waf

  # OWASP Coraza WAF (with the OWASP Core Rule Set) acting as a reverse proxy.
  # Request flow: internet -> nginx (TLS/certbot, unchanged) -> coraza-waf -> web:8000
  # NOTE: the vhost proxy_pass in ./vhosts/<domain>.conf must point at
  #       http://coraza-waf:8080 instead of http://web:8000 (see docs/coraza-waf.md).
  # Keep DetectionOnly in dev so annotator traffic is never blocked while tuning.
  coraza-waf:
    image: ghcr.io/coreruleset/coraza-crs:nginx
    restart: unless-stopped
    environment:
      BACKEND: "web:8000"
      PORT: "8080"
      SERVER_NAME: "localhost"
      CORAZA_RULE_ENGINE: "${CORAZA_RULE_ENGINE:-DetectionOnly}"
      PARANOIA: "${CORAZA_PARANOIA:-1}"
      ANOMALY_INBOUND: "${CORAZA_ANOMALY_INBOUND:-5}"
      ANOMALY_OUTBOUND: "${CORAZA_ANOMALY_OUTBOUND:-4}"
      CORAZA_REQ_BODY_LIMIT: "${CORAZA_REQ_BODY_LIMIT:-104857600}"
    expose:
      - "8080"
    depends_on:
      - web

  certbot:
    build: ./certbot
    image: evgeniy-khyst/certbot
    env_file:
      - ./config.env
    volumes:
      - letsencrypt_certs:/etc/letsencrypt
      - certbot_acme_challenge:/var/www/certbot

  cron:
    build: ./cron
    image: evgeniy-khyst/cron
    environment:
      COMPOSE_PROJECT_NAME: "${COMPOSE_PROJECT_NAME}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workdir:ro
    restart: unless-stopped

  web:
    build: ./backend
    command: gunicorn --bind 0.0.0.0:8000 --workers 4 shoonya_backend.wsgi --timeout 300
    volumes:
      - ./backend/:/usr/src/backend/
      - static_volume:/usr/src/backend/static
      - logs_vol:/logs
    ports:
      - 8000:8000
    depends_on:
      - redis
  redis:
    container_name: redis
    image: "redis"
    ports:
      - 6379:6379

  celery:
    container_name: celery-default
    restart: always
    build: ./backend
    command: celery -A shoonya_backend.celery worker -Q default --concurrency=2 --loglevel=info
    volumes:
      - ./backend/:/usr/src/backend/
      - logs_vol:/logs
    depends_on:
      - redis
      - web

  # This is the additional queue which contains the low-priority celery tasks. We can adjust the concurrency and workers alloted to this container.
  celery2:
    container_name: celery-low-priority
    restart: always
    build: ./backend
    command: celery -A shoonya_backend.celery worker -Q functions --concurrency=2 --loglevel=info
    volumes:
      - ./backend/:/usr/src/backend/
      - logs_vol:/logs
    depends_on:
      - redis
      - web
  logstash:
    container_name: logstash
    image: docker.elastic.co/logstash/logstash:7.14.0
    hostname: shoonya_dev_logger
    volumes:
      - ./logstash_dev.conf:/usr/share/logstash/pipeline/logstash.conf
      - logs_vol:/logs
    extra_hosts:
      - "elasticsearch:20.42.57.194"
    command: logstash -f /usr/share/logstash/pipeline/logstash.conf

  # Celery beats - for scheduling daily e-mails - commented out for dev hostings.
  # celery-beat:
  #   build: ./backend
  #   command: celery -A shoonya_backend.celery beat --loglevel=info
  #   volumes:
  #     - ./backend/:/usr/src/backend
  #   depends_on:
  #     - redis
  #     - web

  celery3:
    container_name: celery-reports
    restart: always
    build: ./backend
    command: celery -A shoonya_backend.celery worker -Q reports --concurrency=2 --loglevel=info
    volumes:
      - ./backend/:/usr/src/backend/
      - logs_vol:/logs
    depends_on:
      - redis
      - web
  flower:
    container_name: flower
    restart: always
    build: ./backend
    command: celery -A shoonya_backend.celery flower --conf="./usr/src/backend/shoonya_backend/flowerconfig.py" --basic-auth="${FLOWER_USERNAME}:${FLOWER_PASSWORD}"
    ports:
      - "5555:5555"
    volumes:
      - ./backend/:/usr/src/backend/
      - logs_vol:/logs
    depends_on:
      - redis
      - web

volumes:
  logs_vol:
    external: true
  nginx_conf:
    external: true
  letsencrypt_certs:
    external: true
  certbot_acme_challenge:
  static_volume:
